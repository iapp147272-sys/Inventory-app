<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Inventory" />
  <title>Inventory Manager</title>
  <link rel="manifest" href="./manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #00e5ff;
      --blue: #ff1744;
      --bg: #0d0d0d;
      --card: rgba(14,14,14,0.9);
      --border: rgba(0,229,255,0.2);
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 20%, #1a0010 0%, #0d0d0d 40%, #00101a 100%);
      font-family: 'Rajdhani', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* Grid bg */
    body::before { /* neon grid */
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    }

    .wrap { position: relative; z-index: 1; padding: 28px 16px 60px; max-width: 600px; margin: 0 auto; }

    /* HEADER */
    .header { text-align: center; margin-bottom: 36px; }
    .header .icon {
      font-size: 48px; display: inline-block;
      filter: drop-shadow(0 0 20px rgba(167,139,250,0.8));
      animation: float3d 4s ease-in-out infinite;
    }
    .header h1 {
      font-size: 22px; font-weight: 900; letter-spacing: 4px; margin-top: 8px; font-family: 'Orbitron', monospace;
      background: linear-gradient(90deg, #80f5ff, #ff1744, #00e5ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { color: var(--muted); font-size: 12px; letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }
    .glow-line {
      width: 100px; height: 2px; margin: 12px auto 0;
      background: linear-gradient(90deg, transparent, var(--purple), var(--blue), transparent);
      border-radius: 2px;
    }

    /* INSTALL BANNER */
    #install-banner {
      display: none;
      background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(56,189,248,0.1));
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 18px;
      margin-bottom: 20px;
      align-items: center; gap: 12px;
    }
    #install-banner.show { display: flex; }
    #install-banner p { font-size: 13px; color: #00e5ff; flex: 1; }
    #install-banner button {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff; border: none; padding: 8px 16px; border-radius: 9px;
      font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap;
    }

    /* CARD */
    .card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border-radius: 22px;
      border: 1px solid var(--border);
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
      margin-bottom: 32px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 2px; background: var(--purple); border-radius: 2px; box-shadow: 0 0 16px var(--purple), 0 0 32px var(--purple); }
    .card::after  { content: ""; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 2px; background: var(--blue); border-radius: 2px; box-shadow: 0 0 12px var(--blue), 0 0 24px var(--blue); }
    .card { position: relative; overflow: hidden; }
    .card:hover {
      transform: perspective(1000px) rotateX(-1deg) translateY(-2px);
      box-shadow: 0 28px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.15), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .card-title {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }
    .card-title .badge {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; box-shadow: 0 4px 14px rgba(0,229,255,0.5);
      flex-shrink: 0;
    }
    .card-title h2 { font-size: 17px; font-weight: 800; color: var(--text); }

    /* FORM */
    .field { margin-bottom: 18px; }
    .field label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: #7c86a1;
      margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px;
    }
    .field input {
      width: 100%; padding: 12px 15px; border-radius: 11px; font-size: 15px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(0,229,255,0.2);
      color: var(--text); outline: none;
      transition: all 0.2s ease;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: var(--purple);
      background: rgba(0,229,255,0.08);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2), 0 0 0 3px rgba(0,229,255,0.15);
    }
    .field input.err { border-color: rgba(255,107,107,0.8); background: rgba(255,80,80,0.08); }
    .field .errmsg { color: #ff6b6b; font-size: 12px; margin-top: 5px; }
    .field input::placeholder { color: #2d3748; }

    /* BUTTONS */
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .btn {
      padding: 13px 20px; border-radius: 13px; border: none; cursor: pointer;
      font-weight: 700; font-size: 15px; transition: all 0.1s ease;
      position: relative;
    }
    .btn:active { transform: translateY(3px) scale(0.97) !important; }
    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
      box-shadow: 0 6px 20px rgba(0,229,255,0.45), 0 2px 0 rgba(255,255,255,0.1) inset;
    }
    .btn-primary:hover { box-shadow: 0 8px 28px rgba(0,229,255,0.55), 0 2px 0 rgba(255,255,255,0.1) inset; }
    .btn-ghost {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.15) !important;
      color: #94a3b8;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }
    .btn-success {
      background: linear-gradient(135deg, #00e5ff, #00b8cc);
      color: #fff; font-size: 13px; padding: 10px 18px;
      box-shadow: 0 6px 20px rgba(0,229,255,0.4), 0 2px 0 rgba(255,255,255,0.1) inset;
    }
    .btn-edit {
      padding: 5px 13px; font-size: 12px; border-radius: 8px;
      background: rgba(0,229,255,0.2); color: var(--purple);
      box-shadow: 0 3px 10px rgba(0,229,255,0.2);
    }
    .btn-del {
      padding: 5px 13px; font-size: 12px; border-radius: 8px;
      background: rgba(255,80,80,0.15); color: #ff6b6b;
      box-shadow: 0 3px 10px rgba(255,80,80,0.15);
    }

    /* TABLE SECTION */
    .table-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
    .table-header h3 { font-size: 17px; font-weight: 800; }
    .table-header p { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }

    .table-wrap {
      border-radius: 18px; overflow: hidden;
      border: 1px solid rgba(0,229,255,0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      background: rgba(10,5,5,0.85);
      backdrop-filter: blur(20px);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr {
      background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(255,23,68,0.08));
      border-bottom: 1px solid rgba(0,229,255,0.2);
    }
    th {
      padding: 13px 14px; text-align: left;
      color: var(--purple); font-weight: 800; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: all 0.2s ease;
      animation: rowIn 0.3s ease both;
    }
    tbody tr:hover { background: rgba(0,229,255,0.07); transform: translateX(3px); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 12px 14px; vertical-align: middle; }
    .td-num { color: #4a5568; font-weight: 700; font-size: 12px; }
    .td-desc { color: var(--text); }
    .td-ri span {
      background: rgba(255,23,68,0.12); color: var(--blue);
      padding: 3px 10px; border-radius: 7px; font-size: 12px; font-weight: 700;
      border: 1px solid rgba(255,23,68,0.2);
    }
    .td-qty { color: var(--purple); font-weight: 800; font-size: 15px; text-shadow: 0 0 12px rgba(0,229,255,0.5); }
    .td-loc { color: var(--muted); font-size: 12px; }
    .td-actions { white-space: nowrap; }
    .td-actions div { display: flex; gap: 6px; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 48px 16px; color: #2d3748; }
    .empty .eicon { font-size: 44px; opacity: 0.3; margin-bottom: 12px; }
    .empty p { font-size: 13px; letter-spacing: 1px; }

    /* TOAST */
    #toast {
      position: fixed; top: 20px; right: 16px; z-index: 9999;
      padding: 13px 22px; border-radius: 13px;
      font-weight: 700; font-size: 14px; color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
      display: none; max-width: calc(100vw - 32px);
    }
    #toast.show { display: block; }
    #toast.success { background: linear-gradient(135deg, #00c896, #059669); box-shadow: 0 8px 28px rgba(0,200,150,0.45); }
    #toast.error   { background: linear-gradient(135deg, #ff4d4d, #dc2626); box-shadow: 0 8px 28px rgba(239,68,68,0.45); }

    /* MODAL */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; z-index: 888; padding: 16px;
    }
    #modal-overlay.show { display: flex; }
    .modal-box {
      background: rgba(15,8,40,0.97);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px; padding: 32px 28px; text-align: center;
      max-width: 320px; width: 100%;
      box-shadow: 0 24px 80px rgba(239,68,68,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: toastIn 0.3s ease both;
    }
    .modal-box .micon { font-size: 42px; margin-bottom: 12px; }
    .modal-box h3 { color: var(--text); font-size: 17px; margin-bottom: 8px; }
    .modal-box p  { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-danger {
      padding: 10px 26px; border-radius: 10px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff;
      font-weight: 700; font-size: 14px;
      box-shadow: 0 5px 18px rgba(239,68,68,0.4);
    }

    /* PARTICLES */
    .particle {
      position: fixed; border-radius: 50%; pointer-events: none;
      background: rgba(167,139,250,0.25);
      animation: float linear infinite alternate;
    }

    /* ANIMATIONS */
    @keyframes float3d {
      0%, 100% { transform: translateY(0) rotateY(0deg); }
      50%       { transform: translateY(-8px) rotateY(10deg); }
    }
    @keyframes float {
      from { transform: translateY(0) translateX(0); }
      to   { transform: translateY(-35px) translateX(20px); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(30px) scale(0.9); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-15px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Corner glows */
  .corner-glow-tl { position: fixed; width: 250px; height: 250px; top: -80px; left: -80px; border-radius: 50%; background: rgba(255,23,68,0.08); filter: blur(80px); pointer-events: none; z-index: 0; }
  .corner-glow-br { position: fixed; width: 250px; height: 250px; bottom: -80px; right: -80px; border-radius: 50%; background: rgba(0,229,255,0.06); filter: blur(80px); pointer-events: none; z-index: 0; }

  /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 4px; }

    /* Responsive table scroll */
    .table-scroll { overflow-x: auto; }
  </style>
</head>
<body>

<div class="corner-glow-tl"></div>
<div class="corner-glow-br"></div>

<!-- Particles -->
<div id="particles"></div>

<div class="wrap">

  <!-- Install Banner -->
  <div id="install-banner">
    <p>📲 Phone pe install karo — offline bhi kaam karega!</p>
    <button id="install-btn">Install</button>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="icon">📦</div>
    <h1>INVENTORY MANAGER</h1>
    <p id="count-text">0 items in database</p>
    <div class="glow-line"></div>
  </div>

  <!-- Form Card -->
  <div class="card" id="form-card">
    <div class="card-title">
      <div class="badge" id="form-badge">➕</div>
      <h2 id="form-title">Add New Item</h2>
    </div>

    <div class="field">
      <label>📝 Description</label>
      <input type="text" id="f-desc" placeholder="e.g. Steel Pipe 2 inch" />
      <div class="errmsg" id="e-desc"></div>
    </div>
    <div class="field">
      <label>🔖 RI No</label>
      <input type="text" id="f-ri" placeholder="e.g. RI-2024-001" />
      <div class="errmsg" id="e-ri"></div>
    </div>
    <div class="field">
      <label>🔢 Quantity</label>
      <input type="number" id="f-qty" placeholder="e.g. 50" inputmode="numeric" />
      <div class="errmsg" id="e-qty"></div>
    </div>
    <div class="field">
      <label>📍 Location</label>
      <input type="text" id="f-loc" placeholder="e.g. Warehouse A, Rack 3" />
      <div class="errmsg" id="e-loc"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="save-btn" onclick="handleSave()">💾 Save Item</button>
      <button class="btn btn-ghost" id="cancel-btn" onclick="handleCancel()" style="display:none">Cancel</button>
    </div>
  </div>

  <!-- Records Section -->
  <div id="records-section" style="display:none">
    <div class="table-header">
      <div>
        <h3>📋 Inventory Records</h3>
        <p id="table-count">0 TOTAL ENTRIES</p>
      </div>
      <button class="btn btn-success" onclick="exportCSV()">📥 Export Excel</button>
    </div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Description</th>
              <th>RI No</th>
              <th>Qty</th>
              <th>Location</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty" id="empty-state">
    <div class="eicon">🗃️</div>
    <p>No items yet. Add your first item above!</p>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Delete Modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="micon">🗑️</div>
    <h3>Delete this record?</h3>
    <p>This action cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-danger" id="confirm-del-btn">Delete</button>
      <button class="btn btn-ghost" onclick="closeModal()" style="padding:10px 22px;font-size:14px">Cancel</button>
    </div>
  </div>
</div>

<script>
  // ── DATA ────────────────────────────────────────────────────────────────────
  const STORAGE_KEY = "inventory_records_v1";
  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let editId = null;
  let deleteId = null;

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  // ── RENDER ──────────────────────────────────────────────────────────────────
  function render() {
    const tbody = document.getElementById("table-body");
    const section = document.getElementById("records-section");
    const empty = document.getElementById("empty-state");
    const countText = document.getElementById("count-text");
    const tableCount = document.getElementById("table-count");

    countText.textContent = `${records.length} item${records.length !== 1 ? "s" : ""} in database`;
    tableCount.textContent = `${records.length} TOTAL ENTRIES`;

    if (records.length === 0) {
      section.style.display = "none";
      empty.style.display = "block";
      return;
    }
    section.style.display = "block";
    empty.style.display = "none";

    tbody.innerHTML = records.map((r, i) => `
      <tr style="animation-delay:${i * 0.04}s">
        <td class="td-num">${i + 1}</td>
        <td class="td-desc">${esc(r.description)}</td>
        <td class="td-ri"><span>${esc(r.riNo)}</span></td>
        <td class="td-qty">${esc(r.quantity)}</td>
        <td class="td-loc">📍 ${esc(r.location)}</td>
        <td class="td-actions">
          <div>
            <button class="btn btn-edit" onclick="startEdit('${r.id}')">Edit</button>
            <button class="btn btn-del"  onclick="askDelete('${r.id}')">Del</button>
          </div>
        </td>
      </tr>
    `).join("");
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── FORM ────────────────────────────────────────────────────────────────────
  function getForm() {
    return {
      description: document.getElementById("f-desc").value.trim(),
      riNo:        document.getElementById("f-ri").value.trim(),
      quantity:    document.getElementById("f-qty").value.trim(),
      location:    document.getElementById("f-loc").value.trim(),
    };
  }

  function setForm(r) {
    document.getElementById("f-desc").value = r.description || "";
    document.getElementById("f-ri").value   = r.riNo || "";
    document.getElementById("f-qty").value  = r.quantity || "";
    document.getElementById("f-loc").value  = r.location || "";
  }

  function clearForm() {
    setForm({ description:"", riNo:"", quantity:"", location:"" });
    ["e-desc","e-ri","e-qty","e-loc"].forEach(id => document.getElementById(id).textContent = "");
    ["f-desc","f-ri","f-qty","f-loc"].forEach(id => document.getElementById(id).classList.remove("err"));
  }

  function validate(f) {
    const e = {};
    if (!f.description) e.description = "⚠ Required";
    if (!f.riNo)        e.riNo        = "⚠ Required";
    if (!f.quantity)    e.quantity    = "⚠ Required";
    else if (isNaN(f.quantity) || Number(f.quantity) < 0) e.quantity = "⚠ Valid number needed";
    if (!f.location)    e.location    = "⚠ Required";
    return e;
  }

  function showErrors(e) {
    const map = { description:"e-desc", riNo:"e-ri", quantity:"e-qty", location:"e-loc" };
    const imap = { description:"f-desc", riNo:"f-ri", quantity:"f-qty", location:"f-loc" };
    Object.keys(map).forEach(k => {
      document.getElementById(map[k]).textContent = e[k] || "";
      document.getElementById(imap[k]).classList.toggle("err", !!e[k]);
    });
  }

  function handleSave() {
    const f = getForm();
    const e = validate(f);
    if (Object.keys(e).length) { showErrors(e); return; }
    showErrors({});

    if (editId) {
      records = records.map(r => r.id === editId ? { ...f, id: editId } : r);
      editId = null;
      showToast("Record updated! ✨");
    } else {
      records.push({ ...f, id: genId() });
      showToast("Record saved! 🎉");
    }
    save();
    clearForm();
    setFormMode(false);
    render();
  }

  function startEdit(id) {
    const r = records.find(r => r.id === id);
    if (!r) return;
    editId = id;
    setForm(r);
    setFormMode(true);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function handleCancel() {
    editId = null;
    clearForm();
    setFormMode(false);
  }

  function setFormMode(isEdit) {
    document.getElementById("form-badge").textContent = isEdit ? "✏️" : "➕";
    document.getElementById("form-title").textContent = isEdit ? "Edit Record" : "Add New Item";
    document.getElementById("save-btn").textContent   = isEdit ? "⬆️ Update Record" : "💾 Save Item";
    document.getElementById("cancel-btn").style.display = isEdit ? "block" : "none";
  }

  // ── DELETE ──────────────────────────────────────────────────────────────────
  function askDelete(id) {
    deleteId = id;
    document.getElementById("modal-overlay").classList.add("show");
  }

  function closeModal() {
    deleteId = null;
    document.getElementById("modal-overlay").classList.remove("show");
  }

  document.getElementById("confirm-del-btn").onclick = () => {
    if (!deleteId) return;
    records = records.filter(r => r.id !== deleteId);
    save(); render(); closeModal();
    showToast("Deleted! 🗑️", "error");
  };

  // ── EXPORT ──────────────────────────────────────────────────────────────────
  function exportCSV() {
    const headers = ["S.No","Description","RI No","Quantity","Location"];
    let csv = headers.join(",") + "\n";
    records.forEach((r, i) => {
      const row = [i+1, r.description, r.riNo, r.quantity, r.location];
      csv += row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",") + "\n";
    });
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `inventory_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Exported! 📥");
  }

  // ── TOAST ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = "success") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ""; }, 2600);
  }

  // ── PARTICLES ───────────────────────────────────────────────────────────────
  (function() {
    const cont = document.getElementById("particles");
    for (let i = 0; i < 16; i++) {
      const d = document.createElement("div");
      d.className = "particle";
      const size = Math.random() * 3 + 1;
      d.style.cssText = `
        left:${Math.random()*100}%;top:${Math.random()*100}%;
        width:${size}px;height:${size}px;
        animation-duration:${Math.random()*12+8}s;
        animation-delay:${Math.random()*8}s;
        opacity:${Math.random()*0.3+0.1};
        box-shadow:0 0 ${size*3}px rgba(0,229,255,0.4);
      `;
      cont.appendChild(d);
    }
  })();

  // ── PWA INSTALL ─────────────────────────────────────────────────────────────
  let deferredPrompt;
  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById("install-banner").classList.add("show");
  });

  document.getElementById("install-btn").onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById("install-banner").classList.remove("show");
    if (outcome === "accepted") showToast("App installed! 🎉");
  };

  window.addEventListener("appinstalled", () => {
    document.getElementById("install-banner").classList.remove("show");
    showToast("App installed! 🎉");
  });

  // ── SERVICE WORKER ───────────────────────────────────────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(console.warn);
  }

  // ── INIT ─────────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
